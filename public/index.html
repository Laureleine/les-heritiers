<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    
    <!-- Configuration Mobile indispensable -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d97706" />
    
    <!-- Icône dans l'onglet -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <!-- Lien vers le Manifeste (pour l'installation PWA) -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Titre et Description -->
    <title>Les Héritiers</title>
    <meta name="description" content="Générateur de personnages pour le jeu de rôle Les Héritiers" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Cloudflare Turnstile (anti-bot) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
      .skip-link{position:absolute;transform:translateY(-100%);padding:.5rem 1rem;background:#92400e;color:#fff;font-weight:700;text-decoration:none;border-radius:0 0 4px 4px;z-index:9999;transition:transform .1s}
      .skip-link:focus{transform:translateY(0)}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>
    <div id="a11y-live" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
    <!-- C'est ici que React va injecter votre App.js -->
    <div id="root"></div>
  </body>
</html>
