<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Petit Parisien — 1899-11-27</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: Georgia, 'Times New Roman', serif;
        max-width: 54em; margin: 2em auto; padding: 0 1.5em;
        color: #1a1a1a; background: #faf9f7; line-height: 1.7;
        font-size: 16px;
    }
    header {
        text-align: center; border-bottom: 3px double #c00;
        padding-bottom: 1em; margin-bottom: 2em;
    }
    .newspaper-title {
        font-family: 'Times New Roman', serif;
        font-size: 3.5em; font-weight: bold; text-transform: uppercase;
        letter-spacing: 2px; color: #111; margin-bottom: 0.1em;
    }
    .newspaper-meta {
        font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;
        color: #555; padding: 0.5em 0; border-top: 1px solid #ccc;
    }
    h1 { font-size: 1.8em; color: #222; margin-bottom: 0.8em; }
    h2 { font-size: 1.3em; margin: 1.2em 0 0.5em; color: #c00; border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
    p { margin: 0.6em 0; text-align: justify; text-indent: 1.5em; }
    .article-card {
        background: #fff; border: 1px solid #e3e0db;
        border-radius: 8px; margin: 1em 0; padding: 1.2em;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    .article-category {
        font-size: 0.8em; font-weight: bold; text-transform: uppercase;
        color: #c00; letter-spacing: 1px; margin-bottom: 0.4em;
    }
    .article-title {
        font-size: 1.4em; font-weight: bold; color: #222;
        margin-bottom: 0.6em; line-height: 1.3;
    }
    .article-summary {
        font-style: italic; color: #555; background: #fdfcf9;
        border-left: 3px solid #e3e0db; padding: 0.6em 1em;
        margin-bottom: 1em; font-size: 0.95em;
    }
    .article-body p {
        text-indent: 1.5em; margin: 0.5em 0;
    }
    footer {
        margin-top: 3em; padding-top: 1.5em; border-top: 1px solid #ccc;
        text-align: center; font-size: 0.85em; color: #888;
    }
</style>
</head>
<body>

<header>
    <div class="newspaper-title">Le Petit Parisien</div>
    <div class="newspaper-meta">Édition Historique Spéciale — 1899-11-27 — Paris</div>
</header>

<main id="articles-container">
    <!-- Les articles seront chargés dynamiquement ici par JavaScript -->
</main>

<footer>
    <p>Projet Archivage Rétro-Moderne & Restauration IA 1899</p>
    <p>Ressources BnF Gallica & Intelligence Artificielle</p>
</footer>

<script src="journal_data.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("articles-container");
        
        if (typeof JOURNAL_ARTICLES === 'undefined' || !JOURNAL_ARTICLES.length) {
            container.innerHTML = "<p><em>Aucun article restauré disponible.</em></p>";
            return;
        }
        
        // Regrouper par page ou afficher dans l'ordre
        JOURNAL_ARTICLES.forEach(art => {
            const card = document.createElement("div");
            card.className = "article-card";
            
            let paragraphsHtml = "";
            art.paragraphs.forEach(p => {
                paragraphsHtml += `<p>${p}</p>`;
            });
            
            card.innerHTML = `
                <div class="article-category">Page ${art.page} — ${art.category}</div>
                <div class="article-title">${art.title}</div>
                <div class="article-summary">${art.summary}</div>
                <div class="article-body">${paragraphsHtml}</div>
            `;
            container.appendChild(card);
        });
    });
</script>

</body>
</html>
